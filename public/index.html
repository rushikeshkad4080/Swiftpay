<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SwiftPay | Merchant Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
  </style>
</head>
<body class="p-8">
  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-12">
      <h1 class="text-2xl font-bold text-blue-500">SwiftPay<span class="text-white">.Portal</span></h1>
      <div class="px-4 py-2 glass text-xs font-mono text-blue-400">SOLANA DEVNET ACTIVE</div>
    </header>

    <!-- Wallet Section -->
    <div class="glass p-6 mb-8">
      <h2 class="text-lg font-bold mb-4">Merchant Wallet</h2>
      <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold transition">Connect Wallet</button>
      <p class="mt-4 text-sm text-gray-400">Your Solana Address:</p>
      <p id="merchant-address" class="text-green-400 font-mono break-all"></p>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
      <div class="glass p-8 h-fit">
        <h2 class="text-xl font-bold mb-6 italic">Generate Payment Link</h2>
        <div class="space-y-4">
          <input id="pName" type="text" placeholder="Product Name" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500">
          <input id="pAmt" type="number" placeholder="Amount (INR)" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none">
          <button onclick="createLink()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition">Create Web3 Link</button>
        </div>
      </div>

      <div class="lg:col-span-2 glass p-8">
        <h2 class="text-xl font-bold mb-6">Recent Transactions</h2>
        <div id="linksList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <!-- Web3Auth & Solana Integration -->
  <script type="module">
    import { Web3Auth } from "https://cdn.jsdelivr.net/npm/@web3auth/modal@latest/dist/modal.esm.js";
    import { SolanaWallet } from "https://cdn.jsdelivr.net/npm/@web3auth/solana-provider@latest/dist/solanaProvider.esm.js";

    const web3auth = new Web3Auth({
      clientId: "YOUR_WEB3AUTH_CLIENT_ID", // Replace with your client ID
      chainConfig: {
        chainNamespace: "solana",
        chainId: "0x3", // Solana Devnet
        rpcTarget: "https://api.devnet.solana.com",
        displayName: "Solana Devnet",
        blockExplorer: "https://explorer.solana.com",
        ticker: "SOL",
        tickerName: "Solana",
      },
    });

    async function initAuth() {
      await web3auth.initModal();
      if (web3auth.connected) {
        setupUserWallet(web3auth.provider);
      }
    }

    async function login() {
      const web3authProvider = await web3auth.connect();
      setupUserWallet(web3authProvider);
    }

    async function setupUserWallet(provider) {
      const solanaWallet = new SolanaWallet(provider);
      const accounts = await solanaWallet.requestAccounts();
      const publicKey = accounts[0];
      document.getElementById('merchant-address').innerText = publicKey;
      console.log("Merchant Wallet Generated:", publicKey);
    }

    initAuth();
  </script>

  <!-- Payment Links Script -->
  <script>
    async function loadLinks() {
      const res = await fetch('/api/links');
      const links = await res.json();
      const list = document.getElementById('linksList');
      list.innerHTML = links.map(l => `
        <div class="bg-white/5 p-5 rounded-2xl border border-white/5 flex justify-between items-center">
          <div>
            <p class="font-bold text-lg">${l.itemName}</p>
            <p class="text-sm text-gray-400">₹${l.amountInr} ➞ <span class="text-green-400">$${l.amountUsdc} USDC</span></p>
          </div>
          <div class="text-right">
            <span class="text-[10px] px-3 py-1 rounded-full ${l.status === 'SETTLED' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">${l.status}</span>
            <div class="mt-3">
              <a href="/pay/${l.id}" target="_blank" class="text-xs text-blue-400 hover:underline">Open Checkout ↗</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function createLink() {
      const itemName = document.getElementById('pName').value;
      const amountInr = document.getElementById('pAmt').value;
      if(!itemName || !amountInr) return;

      await fetch('/api/create-link', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ itemName, amountInr })
      });
      document.getElementById('pName').value = '';
      document.getElementById('pAmt').value = '';
      loadLinks();
    }
    window.onload = loadLinks;
  </script>
</body>
</html>
